# Third-party infra images (pinned, not affected by deploy_sha).
# Keep these pointed at the local Nexus Docker registry; sync upstream sources
# into Nexus before running infra/open-webui/openclaw/search roles.
postgres_image: "{{ nexus_docker_registry }}/pgvector/pgvector:pg16"
redis_image: "{{ nexus_docker_registry }}/library/redis:7-alpine"
minio_image: "{{ nexus_docker_registry }}/minio/minio:RELEASE.2024-01-31T20-20-33Z"
minio_mc_image: "{{ nexus_docker_registry }}/minio/mc:latest"
clickhouse_image: "{{ nexus_docker_registry }}/clickhouse/clickhouse-server:24.3.4.147"
litellm_image: "{{ nexus_docker_registry }}/berriai/litellm:main-latest"
searxng_image: "{{ nexus_docker_registry }}/searxng/searxng:latest"
wren_engine_image: "{{ nexus_docker_registry }}/canner/wren-engine-ibis:0.24.6"
wren_engine_enabled: false
open_webui_image: "{{ nexus_docker_registry }}/open-webui/open-webui:v0.9.2"
open_webui_nginx_image: "{{ nexus_docker_registry }}/library/nginx:alpine"
kk_file_view_image: "{{ nexus_docker_registry }}/keking/kkfileview:latest"
onlyoffice_image: "{{ nexus_docker_registry }}/onlyoffice/documentserver:8.2"
openclaw_image: "{{ nexus_docker_registry }}/alpine/openclaw:2026.5.18"
baidu_search_image: "{{ nexus_docker_registry }}/baidu-search-service:{{ deploy_sha }}"
hermes_runtime_image_version: "{{ nexus_docker_registry }}/vecta-hermes-withopenclaw:v2026.5.16"

# Public vtest nginx vhost. The host nginx config must route browser paths into
# the infra-owned Open WebUI proxy on :3002, not directly to app containers.
host_nginx_enabled: true
host_nginx_site_name: vtest.fitocfo.com
host_nginx_server_names:
  - vtest.fitocfo.com
  - vtest.matrix-ai.com.cn
host_nginx_ssl_certificate: /etc/letsencrypt/live/vtest.fitocfo.com/fullchain.pem
host_nginx_ssl_certificate_key: /etc/letsencrypt/live/vtest.fitocfo.com/privkey.pem

# Nexus dependency/cache endpoints.
nexus_base_url: "http://127.0.0.1:8081"
nexus_npm_proxy_repo: vecta-npm-proxy
nexus_pypi_proxy_repo: vecta-pypi-proxy
nexus_alpine_proxy_repo: vecta-alpine-vtest-proxy
nexus_debian_proxy_repo: vecta-debian-vtest-proxy
nexus_debian_security_proxy_repo: vecta-debian-security-vtest-proxy
nexus_alpine_remote_url: "https://mirrors.aliyun.com/alpine"
nexus_debian_remote_url: "https://mirrors.aliyun.com/debian"
nexus_debian_security_remote_url: "https://mirrors.aliyun.com/debian-security"

# App-built images — stored in Nexus OSS Docker hosted repo on port 8082
# Login: docker login 127.0.0.1:8082 -u admin -p "$NEXUS_ADMIN_PASSWORD"
nexus_docker_registry: "127.0.0.1:8082"

vtest_required_image_repos:
  - fleet-gateway
  - channel-gateway
  - a2a-router
  - rag-service
  - directory-service
  - admin-console
  - wechat-contact-sync
  - baidu-search-service
  - fruit-industry-pack

vtest_migrator_image_repo: vecta-migrator

vtest_write_quiesce_services:
  - fleet-gateway
  - channel-gateway
  - wechat-contact-sync

fleet_gateway_image: "{{ nexus_docker_registry }}/fleet-gateway:{{ deploy_sha }}"
channel_gateway_image: "{{ nexus_docker_registry }}/channel-gateway:{{ deploy_sha }}"
a2a_router_image: "{{ nexus_docker_registry }}/a2a-router:{{ deploy_sha }}"
rag_service_image: "{{ nexus_docker_registry }}/rag-service:{{ deploy_sha }}"
directory_service_image: "{{ nexus_docker_registry }}/directory-service:{{ deploy_sha }}"
admin_console_image: "{{ nexus_docker_registry }}/admin-console:{{ deploy_sha }}"
wechat_contact_sync_image: "{{ nexus_docker_registry }}/wechat-contact-sync:{{ deploy_sha }}"
fruit_industry_pack_image: "{{ nexus_docker_registry }}/fruit-industry-pack:{{ deploy_sha }}"
vecta_migrator_image: "{{ nexus_docker_registry }}/{{ vtest_migrator_image_repo }}:{{ deploy_sha }}"

# Fruit industry pack Live Test policy and service-to-service credentials.
# Dedicated secrets can override these host-local vtest fallbacks later.
fruit_runtime_db_role: fruit_runtime
fruit_runtime_db_password: "{{ lookup('env', 'FRUIT_RUNTIME_DB_PASSWORD') | default(postgres_password, true) }}"
fruit_service_secret: "{{ lookup('env', 'FRUIT_SERVICE_SECRET') | default(lookup('env', 'SERVICE_KEY'), true) }}"
fruit_allowed_tenant_ids: "{{ lookup('env', 'FRUIT_ALLOWED_TENANT_IDS').split(',') | map('trim') | reject('equalto', '') | list }}"
fruit_allowed_employee_ids: "{{ lookup('env', 'FRUIT_ALLOWED_EMPLOYEE_IDS').split(',') | map('trim') | reject('equalto', '') | list }}"
fruit_skill_admin_employee_id: "{{ lookup('env', 'FRUIT_SKILL_ADMIN_EMPLOYEE_ID') | default('', true) }}"
fruit_live_employee_ids: "{{ lookup('env', 'FRUIT_LIVE_EMPLOYEE_IDS').split(',') | map('trim') | reject('equalto', '') | list }}"

# npm/apk/apt: build containers consume Nexus proxies only.
npm_registry_url: "{{ nexus_base_url }}/repository/{{ nexus_npm_proxy_repo }}/"
pypi_index_url: "{{ nexus_base_url }}/repository/{{ nexus_pypi_proxy_repo }}/simple/"
alpine_mirror: "{{ nexus_base_url }}/repository/{{ nexus_alpine_proxy_repo }}"
debian_mirror: "{{ nexus_base_url }}/repository/{{ nexus_debian_proxy_repo }}"
debian_security_mirror: "{{ nexus_base_url }}/repository/{{ nexus_debian_security_proxy_repo }}"
docker_base_image_registry: "{{ nexus_docker_registry }}"
docker_network: "openclaw-enterprise_openclaw-net"

# Docker-network endpoints consumed by app containers. These must be infra-owned
# because host-published ports from /data/ocee/.env are not valid inside Docker.
minio_internal_endpoint: "openclaw-minio"
minio_internal_port: "9000"
minio_bucket: "files"
minio_use_ssl: "false"
litellm_internal_base_url: "http://openclaw-litellm:4000"
fleet_gateway_internal_url: "http://openclaw-fleet-gateway:3000"

# vtest exposes the public SaaS registration page. Keep these explicit so the
# deployed gateway matches the UI and does not depend on container defaults.
allow_self_signup: true
email_verification_required: false

# Platform-only diagnostics and security settings require an L4 user whose
# employee_id is listed here. Keep tenant L4 users out of this list.
platform_root_employee_ids:
  - IT001
  - admin@matrix.com

# Runtime DB/cache credentials are host-local vtest state, not Git repo state.
# The self-hosted runner sources /data/ocee/.env before invoking Ansible.
postgres_user: "{{ lookup('env', 'POSTGRES_USER') | default('openclaw_poc', true) }}"
postgres_password: "{{ lookup('env', 'POSTGRES_PASSWORD') | default('poc-db-password-change-me', true) }}"
postgres_db: "{{ lookup('env', 'POSTGRES_DB') | default('openclaw_poc', true) }}"
redis_password: "{{ lookup('env', 'REDIS_PASSWORD') | default('changeme-redis-pw', true) }}"
