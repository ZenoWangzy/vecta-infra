- name: Ensure Open WebUI Docker networks exist
  community.docker.docker_network:
    name: "{{ item }}"
    state: present
  loop:
    - "{{ docker_network }}"
    - "{{ open_webui_network }}"

- name: Ensure Open WebUI nginx config directory
  ansible.builtin.file:
    path: "{{ open_webui_nginx_config_dir }}"
    state: directory
    mode: "0755"

- name: Render Open WebUI proxy nginx config
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: "{{ open_webui_nginx_config_path }}"
    mode: "0644"
  register: open_webui_nginx_config

- name: Start Open WebUI
  community.docker.docker_container:
    name: openclaw-open-webui
    image: "{{ open_webui_image }}"
    state: started
    pull: true
    image_name_mismatch: recreate
    restart_policy: unless-stopped
    volumes:
      - openclaw-open-webui-data:/app/backend/data
    env:
      OPENAI_API_BASE_URL: "http://openclaw-fleet-gateway:3000/v1"
      OPENAI_API_KEY: "{{ lookup('env', 'OPENWEBUI_SERVICE_KEY') | default(lookup('env', 'SERVICE_KEY'), true) }}"
      OPENAI_API_CONFIGS: '{"0":{"enable":true,"model_ids":["{{ open_webui_model_id }}"]}}'
      DEFAULT_MODELS: "{{ open_webui_model_id }}"
      DEFAULT_PINNED_MODELS: "{{ open_webui_model_id }}"
      TASK_MODEL_EXTERNAL: "{{ open_webui_model_id }}"
      ENABLE_OLLAMA_API: "false"
      OLLAMA_BASE_URL: ""
      WEBUI_SECRET_KEY: "{{ lookup('env', 'WEBUI_SECRET_KEY') }}"
      WEBUI_URL: "{{ base_url }}/chat"
      WEBUI_AUTH_TRUSTED_EMAIL_HEADER: X-Auth-Email
      WEBUI_AUTH_TRUSTED_NAME_HEADER: X-Auth-Name
      WEBUI_AUTH_TRUSTED_ROLE_HEADER: X-Auth-Role
      ENABLE_FORWARD_USER_INFO_HEADERS: "true"
      FORWARD_USER_INFO_HEADER_USER_EMAIL: X-Auth-Email
      FORWARD_USER_INFO_HEADER_USER_NAME: X-Auth-Name
      FORWARD_USER_INFO_HEADER_USER_ROLE: X-Auth-Role
    networks:
      - name: "{{ docker_network }}"
      - name: "{{ open_webui_network }}"
    memory: "{{ open_webui_memory }}"
    memory_swap: "{{ open_webui_memory_swap }}"
  register: open_webui_container

- name: Start Open WebUI proxy (nginx)
  community.docker.docker_container:
    name: openclaw-webui-proxy
    image: "{{ open_webui_nginx_image }}"
    state: started
    pull: true
    image_name_mismatch: recreate
    restart_policy: unless-stopped
    ports:
      - "3002:80"
    volumes:
      - "{{ open_webui_nginx_config_path }}:/etc/nginx/conf.d/default.conf:ro"
    networks:
      - name: "{{ docker_network }}"
      - name: "{{ open_webui_network }}"
    restart: "{{ (open_webui_nginx_config.changed | default(false)) or (open_webui_container.changed | default(false)) }}"

- name: Probe Open WebUI proxy health
  ansible.builtin.uri:
    url: "{{ open_webui_proxy_health_url }}"
    method: GET
    status_code: 200
    return_content: true
  register: open_webui_proxy_health
  failed_when: false
  changed_when: false

- name: Reload Open WebUI proxy after unhealthy probe
  community.docker.docker_container_exec:
    container: openclaw-webui-proxy
    argv:
      - nginx
      - -s
      - reload
  when: >
    (open_webui_proxy_health.status | default(0) != 200) or
    not (open_webui_proxy_health.json.status | default(false) | bool)

- name: Wait for Open WebUI proxy health
  ansible.builtin.uri:
    url: "{{ open_webui_proxy_health_url }}"
    method: GET
    status_code: 200
    return_content: true
  register: open_webui_proxy_health_ready
  retries: "{{ open_webui_proxy_health_retries }}"
  delay: "{{ open_webui_proxy_health_delay }}"
  until:
    - open_webui_proxy_health_ready.status | default(0) == 200
    - open_webui_proxy_health_ready.json.status | default(false) | bool
  changed_when: false

- name: Ensure Open WebUI channel user mappings
  ansible.builtin.shell: |
    docker exec -i openclaw-postgres psql \
      -U {{ postgres_user | default('openclaw_poc') | quote }} \
      -d {{ postgres_db | default('openclaw_poc') | quote }} \
      -v ON_ERROR_STOP=1 \
      -v employee_id={{ item.employee_id | quote }} \
      -v channel_uid={{ item.channel_uid | default(item.employee_id) | quote }} \
      -tA <<'SQL'
    WITH input AS (
      SELECT :'employee_id'::text AS employee_id,
             :'channel_uid'::text AS channel_uid
    ),
    employee AS (
      SELECT e.employee_id, e.tenant_id, input.channel_uid
        FROM employees e
        CROSS JOIN input
       WHERE lower(e.employee_id) = lower(input.employee_id)
       LIMIT 1
    ),
    updated AS (
      UPDATE channel_user_mapping mapping
         SET employee_id = employee.employee_id,
             status = 'active',
             bound_at = COALESCE(mapping.bound_at, now())
        FROM employee
       WHERE mapping.provider_config_id IS NULL
         AND mapping.channel = 'open-webui'
         AND mapping.tenant_id = employee.tenant_id
         AND lower(mapping.channel_uid) = lower(employee.channel_uid)
         AND (
           mapping.employee_id IS DISTINCT FROM employee.employee_id
           OR mapping.status IS DISTINCT FROM 'active'
         )
       RETURNING 1
    ),
    inserted AS (
      INSERT INTO channel_user_mapping (employee_id, tenant_id, channel, channel_uid, status)
      SELECT employee.employee_id, employee.tenant_id, 'open-webui', employee.channel_uid, 'active'
        FROM employee
      ON CONFLICT DO NOTHING
      RETURNING 1
    )
    SELECT (SELECT count(*) FROM updated) + (SELECT count(*) FROM inserted);
    SQL
  args:
    executable: /bin/bash
  loop: "{{ open_webui_user_mappings }}"
  loop_control:
    label: "{{ item.channel_uid | default(item.employee_id) }}"
  register: open_webui_mapping_upsert
  changed_when: (open_webui_mapping_upsert.stdout | trim | int) > 0
  when: (open_webui_user_mappings | default([]) | length) > 0

- name: Render host nginx vtest site
  become: true
  ansible.builtin.template:
    src: host-nginx-site.conf.j2
    dest: "{{ host_nginx_site_available_path }}"
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: host_nginx_site
  when: host_nginx_enabled | bool

- name: Enable host nginx vtest site
  become: true
  ansible.builtin.file:
    src: "{{ host_nginx_site_available_path }}"
    dest: "{{ host_nginx_site_enabled_path }}"
    state: link
    force: true
  register: host_nginx_site_link
  when: host_nginx_enabled | bool

- name: Validate host nginx config
  become: true
  ansible.builtin.command:
    argv:
      - nginx
      - -t
  changed_when: false
  when:
    - host_nginx_enabled | bool
    - (host_nginx_site is defined and host_nginx_site.changed | default(false)) or (host_nginx_site_link is defined and host_nginx_site_link.changed | default(false))

- name: Reload host nginx
  become: true
  ansible.builtin.service:
    name: nginx
    state: reloaded
  when:
    - host_nginx_enabled | bool
    - (host_nginx_site is defined and host_nginx_site.changed | default(false)) or (host_nginx_site_link is defined and host_nginx_site_link.changed | default(false))

- name: Start KK File View
  community.docker.docker_container:
    name: kkfileview
    image: "{{ kk_file_view_image }}"
    state: started
    pull: true
    image_name_mismatch: recreate
    restart_policy: unless-stopped
    networks:
      - name: "{{ docker_network }}"
      - name: "{{ open_webui_network }}"
    memory: "512m"

- name: Start OnlyOffice Document Server
  community.docker.docker_container:
    name: onlyoffice
    image: "{{ onlyoffice_image }}"
    state: started
    pull: true
    image_name_mismatch: recreate
    restart_policy: unless-stopped
    volumes:
      - onlyoffice_logs:/var/log/onlyoffice
      - onlyoffice_data:/var/www/onlyoffice/Data
    networks:
      - name: "{{ docker_network }}"
      - name: "{{ open_webui_network }}"
