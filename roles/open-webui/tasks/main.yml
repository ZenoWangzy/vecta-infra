- name: Start Open WebUI
  community.docker.docker_container:
    name: openclaw-open-webui
    image: "{{ open_webui_image }}"
    state: started
    restart_policy: unless-stopped
    volumes:
      - openclaw-open-webui-data:/app/backend/data
    env:
      OPENAI_API_KEY: "{{ lookup('env', 'OPENWEBUI_SERVICE_KEY') }}"
      WEBUI_SECRET_KEY: "{{ lookup('env', 'WEBUI_SECRET_KEY') }}"
      WEBUI_URL: "{{ base_url }}/chat"
    networks:
      - name: openclaw-net
      - name: openclaw-open-webui-net
    memory: "512m"

- name: Start Open WebUI proxy (nginx)
  community.docker.docker_container:
    name: openclaw-webui-proxy
    image: nginx:alpine
    state: started
    restart_policy: unless-stopped
    ports:
      - "3002:80"
    volumes:
      - "{{ remote_dir }}/infra/open-webui/nginx.conf:/etc/nginx/conf.d/default.conf:ro"
    networks:
      - name: openclaw-net
      - name: openclaw-open-webui-net

- name: Start KK File View
  community.docker.docker_container:
    name: kkfileview
    image: "{{ kk_file_view_image }}"
    state: started
    restart_policy: unless-stopped
    networks:
      - name: openclaw-net
      - name: openclaw-open-webui-net
    memory: "512m"

- name: Start OnlyOffice Document Server
  community.docker.docker_container:
    name: onlyoffice
    image: "{{ onlyoffice_image }}"
    state: started
    restart_policy: unless-stopped
    volumes:
      - onlyoffice_logs:/var/log/onlyoffice
      - onlyoffice_data:/var/www/onlyoffice/Data
    networks:
      - name: openclaw-net
      - name: openclaw-open-webui-net
