- name: Ensure Open WebUI Docker networks exist
  community.docker.docker_network:
    name: "{{ item }}"
    state: present
  loop:
    - "{{ docker_network }}"
    - "{{ open_webui_network }}"

- name: Ensure Open WebUI nginx config directory
  ansible.builtin.file:
    path: "{{ open_webui_nginx_config_dir }}"
    state: directory
    mode: "0755"

- name: Render Open WebUI proxy nginx config
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: "{{ open_webui_nginx_config_path }}"
    mode: "0644"
  register: open_webui_nginx_config

- name: Start Open WebUI
  community.docker.docker_container:
    name: openclaw-open-webui
    image: "{{ open_webui_image }}"
    state: started
    restart_policy: unless-stopped
    volumes:
      - openclaw-open-webui-data:/app/backend/data
    env:
      OPENAI_API_KEY: "{{ lookup('env', 'OPENWEBUI_SERVICE_KEY') | default(lookup('env', 'SERVICE_KEY'), true) }}"
      WEBUI_SECRET_KEY: "{{ lookup('env', 'WEBUI_SECRET_KEY') }}"
      WEBUI_URL: "{{ base_url }}/chat"
    networks:
      - name: "{{ docker_network }}"
      - name: "{{ open_webui_network }}"
    memory: "512m"

- name: Start Open WebUI proxy (nginx)
  community.docker.docker_container:
    name: openclaw-webui-proxy
    image: "{{ open_webui_nginx_image }}"
    state: started
    restart_policy: unless-stopped
    ports:
      - "3002:80"
    volumes:
      - "{{ open_webui_nginx_config_path }}:/etc/nginx/conf.d/default.conf:ro"
    networks:
      - name: "{{ docker_network }}"
      - name: "{{ open_webui_network }}"
    restart: "{{ open_webui_nginx_config.changed | default(false) }}"

- name: Render host nginx vtest site
  become: true
  ansible.builtin.template:
    src: host-nginx-site.conf.j2
    dest: "{{ host_nginx_site_available_path }}"
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: host_nginx_site
  when: host_nginx_enabled | bool

- name: Enable host nginx vtest site
  become: true
  ansible.builtin.file:
    src: "{{ host_nginx_site_available_path }}"
    dest: "{{ host_nginx_site_enabled_path }}"
    state: link
    force: true
  register: host_nginx_site_link
  when: host_nginx_enabled | bool

- name: Validate host nginx config
  become: true
  ansible.builtin.command:
    argv:
      - nginx
      - -t
  changed_when: false
  when:
    - host_nginx_enabled | bool
    - (host_nginx_site is defined and host_nginx_site.changed | default(false)) or (host_nginx_site_link is defined and host_nginx_site_link.changed | default(false))

- name: Reload host nginx
  become: true
  ansible.builtin.service:
    name: nginx
    state: reloaded
  when:
    - host_nginx_enabled | bool
    - (host_nginx_site is defined and host_nginx_site.changed | default(false)) or (host_nginx_site_link is defined and host_nginx_site_link.changed | default(false))

- name: Start KK File View
  community.docker.docker_container:
    name: kkfileview
    image: "{{ kk_file_view_image }}"
    state: started
    restart_policy: unless-stopped
    networks:
      - name: "{{ docker_network }}"
      - name: "{{ open_webui_network }}"
    memory: "512m"

- name: Start OnlyOffice Document Server
  community.docker.docker_container:
    name: onlyoffice
    image: "{{ onlyoffice_image }}"
    state: started
    restart_policy: unless-stopped
    volumes:
      - onlyoffice_logs:/var/log/onlyoffice
      - onlyoffice_data:/var/www/onlyoffice/Data
    networks:
      - name: "{{ docker_network }}"
      - name: "{{ open_webui_network }}"
