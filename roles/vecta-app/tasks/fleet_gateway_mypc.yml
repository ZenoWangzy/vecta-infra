---
# Fleet owns the manager contract for existing per-user runtimes. It is safe to
# replace only the gateway container when its mounts, networks, user, and live
# environment are retained, and no runtime container is recreated.
- name: Capture mypc Fleet gateway contract
  ansible.builtin.command:
    argv: [docker, inspect, "{{ fleet_gateway_container_name }}"]
  register: mypc_fleet_gateway_inspect
  changed_when: false
  check_mode: false
  no_log: true

- name: Parse mypc Fleet gateway contract
  ansible.builtin.set_fact:
    mypc_fleet_gateway_live: "{{ (mypc_fleet_gateway_inspect.stdout | from_json) | first }}"
  no_log: true

- name: Require a running mypc Fleet gateway source container
  ansible.builtin.assert:
    that:
      - mypc_fleet_gateway_live.State.Running | bool
      - mypc_fleet_gateway_live.Config.User == fleet_gateway_user
      - mypc_fleet_gateway_live.Config.Env | length > 0
    fail_msg: "The existing Fleet gateway is not a valid migration source."
  no_log: true

- name: Require the reviewed mypc Fleet mount contract
  ansible.builtin.shell: >-
    docker inspect {{ fleet_gateway_container_name | quote }} |
    jq -e --arg instances {{ fleet_gateway_instances_host_path | quote }}
    --arg knowledge {{ fleet_gateway_knowledge_host_path | quote }}
    --arg templates {{ fleet_gateway_templates_host_path | quote }}
    --arg plugins {{ fleet_gateway_shared_plugins_host_path | quote }}
    --arg litellm {{ fleet_gateway_litellm_config_host_path | quote }}
    --arg fruit {{ fleet_gateway_fruit_pack_host_path | quote }}
    '([.[0].Mounts[] | select(.Source == $instances and .Destination == "/app/data/instances" and .RW)] | length == 1)
    and ([.[0].Mounts[] | select(.Source == $knowledge and .Destination == "/app/knowledge" and .RW)] | length == 1)
    and ([.[0].Mounts[] | select(.Source == $templates and .Destination == "/app/templates" and (.RW | not))] | length == 1)
    and ([.[0].Mounts[] | select(.Source == $plugins and .Destination == "/app/shared-plugins" and (.RW | not))] | length == 1)
    and ([.[0].Mounts[] | select(.Source == $litellm and .Destination == "/app/litellm-config.yaml" and (.RW | not))] | length == 1)
    and ([.[0].Mounts[] | select(.Source == $fruit and .Destination == "/app/industry-packs/fruit" and (.RW | not))] | length == 1)
    and ([.[0].Mounts[] | select(.Source == "/var/run/docker.sock" and .Destination == "/var/run/docker.sock" and .RW)] | length == 1)'
  args:
    executable: /bin/bash
  changed_when: false
  check_mode: false

- name: Verify current and Nexus Fleet image identities match
  ansible.builtin.shell: >-
    test "$(docker image inspect {{ mypc_fleet_gateway_live.Config.Image | quote }} --format '{{ '{{' }}.Id{{ '}}' }}')"
    = "$(docker image inspect {{ fleet_gateway_image | quote }} --format '{{ '{{' }}.Id{{ '}}' }}')"
  args:
    executable: /bin/bash
  changed_when: false
  check_mode: false
  no_log: true

- name: Capture running per-user runtime count before Fleet adoption
  ansible.builtin.shell: >-
    docker ps -q --filter label=openclaw.enterprise.openclaw-image | wc -l
  args:
    executable: /bin/bash
  register: mypc_fleet_runtime_count_before
  changed_when: false
  check_mode: false

- name: Back up Fleet instance state before Nexus adoption
  ansible.builtin.shell: |
    set -euo pipefail
    stamp="$(date -u +%Y%m%dT%H%M%SZ)"
    backup_dir="{{ fleet_gateway_backup_root }}/fleet-gateway-nexus-adoption-${stamp}"
    mkdir -p "$backup_dir"
    tar -C {{ fleet_gateway_instances_host_path | quote }} -czf "$backup_dir/instances.tgz" .
    sha256sum "$backup_dir/instances.tgz" > "$backup_dir/checksums.sha256"
    {
      echo "source_image=$(docker inspect -f '{{ '{{' }}.Config.Image{{ '}}' }}' {{ fleet_gateway_container_name | quote }})"
      echo "runtime_count_before={{ mypc_fleet_runtime_count_before.stdout | trim }}"
      echo "instances_path={{ fleet_gateway_instances_host_path }}"
    } > "$backup_dir/manifest.txt"
  args:
    executable: /bin/bash
  changed_when: true
  when: not ansible_check_mode

- name: Run Fleet regression before Nexus adoption
  ansible.builtin.script:
    cmd: "{{ role_path }}/../../scripts/mypc-app-regression.sh --service fleet-gateway --phase before"
  changed_when: false
  check_mode: false

- name: Recreate mypc Fleet gateway from the identical Nexus image
  community.docker.docker_container:
    name: "{{ fleet_gateway_container_name }}"
    image: "{{ fleet_gateway_image }}"
    state: started
    pull: true
    image_name_mismatch: recreate
    restart_policy: "{{ fleet_gateway_restart_policy }}"
    user: "{{ fleet_gateway_user }}"
    command: "{{ mypc_fleet_gateway_live.Config.Cmd }}"
    entrypoint: "{{ mypc_fleet_gateway_live.Config.Entrypoint }}"
    env: "{{ dict(mypc_fleet_gateway_live.Config.Env | map('split', '=', 1)) }}"
    ports: "{{ fleet_gateway_published_ports }}"
    volumes:
      - "{{ fleet_gateway_instances_host_path }}:/app/data/instances:rw"
      - "{{ fleet_gateway_knowledge_host_path }}:/app/knowledge:rw"
      - "{{ fleet_gateway_templates_host_path }}:/app/templates:ro"
      - "{{ fleet_gateway_shared_plugins_host_path }}:/app/shared-plugins:ro"
      - "{{ fleet_gateway_litellm_config_host_path }}:/app/litellm-config.yaml:ro"
      - "{{ fleet_gateway_fruit_pack_host_path }}:/app/industry-packs/fruit:ro"
      - "/var/run/docker.sock:/var/run/docker.sock:rw"
    networks:
      - name: "{{ docker_network }}"
        aliases: "{{ fleet_gateway_network_aliases }}"
      - name: "{{ open_webui_network }}"
        aliases: "{{ fleet_gateway_network_aliases }}"
    networks_cli_compatible: true
    comparisons:
      networks: strict
    log_driver: "{{ fleet_gateway_log_driver }}"
    log_options: "{{ fleet_gateway_log_options }}"
    memory: "{{ fleet_gateway_memory }}"
    cpus: "{{ fleet_gateway_cpus }}"
  no_log: true

- name: Require the same per-user runtime count after Fleet adoption
  ansible.builtin.shell: >-
    test "$(docker ps -q --filter label=openclaw.enterprise.openclaw-image | wc -l)"
    = "{{ mypc_fleet_runtime_count_before.stdout | trim }}"
  args:
    executable: /bin/bash
  changed_when: false
  when: not ansible_check_mode

- name: Run Fleet regression after Nexus adoption
  ansible.builtin.script:
    cmd: "{{ role_path }}/../../scripts/mypc-app-regression.sh --service fleet-gateway --phase after"
  environment:
    EXPECTED_IMAGE: "{{ fleet_gateway_image }}"
  changed_when: false
  when: not ansible_check_mode
