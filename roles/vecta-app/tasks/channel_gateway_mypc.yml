---
# Channel Gateway is the active mypc channel owner. Preserve its live channel
# credentials/control flags, non-root user, data bind, and aliases exactly.
- name: Capture mypc Channel Gateway contract
  ansible.builtin.command:
    argv: [docker, inspect, "{{ channel_gateway_container_name }}"]
  register: mypc_channel_gateway_inspect
  changed_when: false
  check_mode: false
  no_log: true

- name: Parse mypc Channel Gateway contract
  ansible.builtin.set_fact:
    mypc_channel_gateway_live: "{{ (mypc_channel_gateway_inspect.stdout | from_json) | first }}"
  no_log: true

- name: Require a valid active mypc Channel Gateway source container
  ansible.builtin.assert:
    that:
      - mypc_channel_gateway_live.State.Running | bool
      - mypc_channel_gateway_live.Config.User == channel_gateway_user
      - mypc_channel_gateway_live.Config.Env | length > 0
    fail_msg: "The existing Channel Gateway is not a valid migration source."
  no_log: true

- name: Require the reviewed mypc Channel Gateway data bind
  ansible.builtin.shell: >-
    docker inspect {{ channel_gateway_container_name | quote }} |
    jq -e --arg data {{ channel_gateway_data_host_path | quote }}
    '([.[0].Mounts[] | select(.Type == "bind" and .Source == $data and .Destination == "/app/packages/channel-gateway/data" and .RW)] | length == 1)'
  args:
    executable: /bin/bash
  changed_when: false
  check_mode: false

- name: Verify current and Nexus Channel Gateway image identities match
  ansible.builtin.shell: >-
    test "$(docker image inspect {{ mypc_channel_gateway_live.Config.Image | quote }} --format '{{ '{{' }}.Id{{ '}}' }}')"
    = "$(docker image inspect {{ channel_gateway_image | quote }} --format '{{ '{{' }}.Id{{ '}}' }}')"
  args:
    executable: /bin/bash
  changed_when: false
  check_mode: false
  no_log: true

- name: Back up Channel Gateway data before Nexus adoption
  ansible.builtin.shell: |
    set -euo pipefail
    backup_dir="{{ channel_gateway_backup_root }}/channel-gateway-nexus-adoption-$(date -u +%Y%m%dT%H%M%SZ)"
    mkdir -p "$backup_dir"
    tar -C {{ channel_gateway_data_host_path | quote }} -czf "$backup_dir/channel-data.tgz" .
    sha256sum "$backup_dir/channel-data.tgz" > "$backup_dir/checksums.sha256"
    printf 'source_image=%s\ndata_path=%s\n' \
      "$(docker inspect -f '{{ '{{' }}.Config.Image{{ '}}' }}' {{ channel_gateway_container_name | quote }})" \
      {{ channel_gateway_data_host_path | quote }} > "$backup_dir/manifest.txt"
  args:
    executable: /bin/bash
  changed_when: true
  when: not ansible_check_mode

- name: Run Channel Gateway regression before Nexus adoption
  ansible.builtin.script:
    cmd: "{{ role_path }}/../../scripts/mypc-app-regression.sh --service channel-gateway --phase before"
  changed_when: false
  check_mode: false

- name: Recreate mypc Channel Gateway from the identical Nexus image
  community.docker.docker_container:
    name: "{{ channel_gateway_container_name }}"
    image: "{{ channel_gateway_image }}"
    state: started
    pull: true
    image_name_mismatch: recreate
    restart_policy: "{{ channel_gateway_restart_policy }}"
    user: "{{ channel_gateway_user }}"
    command: "{{ mypc_channel_gateway_live.Config.Cmd }}"
    entrypoint: "{{ mypc_channel_gateway_live.Config.Entrypoint }}"
    env: "{{ dict(mypc_channel_gateway_live.Config.Env | map('split', '=', 1)) }}"
    ports: "{{ channel_gateway_published_ports }}"
    volumes:
      - "{{ channel_gateway_data_host_path }}:/app/packages/channel-gateway/data:rw"
    networks:
      - name: "{{ docker_network }}"
        aliases: "{{ channel_gateway_network_aliases }}"
    networks_cli_compatible: true
    comparisons:
      networks: strict
    log_driver: "{{ channel_gateway_log_driver }}"
    log_options: "{{ channel_gateway_log_options }}"
    memory: "{{ channel_gateway_memory }}"
    cpus: "{{ channel_gateway_cpus }}"
  no_log: true

- name: Run Channel Gateway regression after Nexus adoption
  ansible.builtin.script:
    cmd: "{{ role_path }}/../../scripts/mypc-app-regression.sh --service channel-gateway --phase after"
  environment:
    EXPECTED_IMAGE: "{{ channel_gateway_image }}"
  changed_when: false
  when: not ansible_check_mode
