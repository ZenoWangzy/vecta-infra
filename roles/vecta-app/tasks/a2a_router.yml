- name: Deploy a2a-router
  community.docker.docker_container:
    name: openclaw-a2a-router
    image: "{{ a2a_router_image }}"
    state: started
    restart_policy: unless-stopped
    pull: true
    image_name_mismatch: recreate
    env:
      A2A_ROUTER_TOKEN: "{{ lookup('env', 'A2A_ROUTER_TOKEN') }}"
      TZ: Asia/Shanghai
    ports:
      - "{{ a2a_router_port | default('9200') }}:9200"
    healthcheck:
      test:
        - CMD-SHELL
        - "node -e \"fetch('http://127.0.0.1:9200/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
      interval: "10s"
      timeout: "5s"
      retries: 5
    networks:
      - name: "{{ docker_network }}"
    memory: "256m"
    cpus: "0.25"
