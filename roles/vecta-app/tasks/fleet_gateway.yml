- name: Wait for postgres before fleet-gateway
  wait_for:
    host: localhost
    port: "{{ postgres_port | default(5432) }}"
    timeout: 60

- name: Wait for a2a-router before fleet-gateway
  wait_for:
    host: localhost
    port: "{{ a2a_router_port | default(9200) }}"
    timeout: 30

- name: Ensure fleet-gateway knowledge upload directory is writable
  file:
    path: "{{ remote_dir }}/data/fleet-gateway/uploads"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0755"

- name: Deploy fleet-gateway
  community.docker.docker_container:
    name: openclaw-fleet-gateway
    image: "{{ fleet_gateway_image }}"
    state: started
    restart_policy: unless-stopped
    pull: true
    image_name_mismatch: recreate
    ports:
      - "{{ fleet_port | default('3000') }}:3000"
    env:
      TZ: Asia/Shanghai
      AUTH_MODE: "{{ auth_mode | default('prod') }}"
      DATABASE_URL: "postgresql://{{ postgres_user | default('openclaw_poc') }}:{{ postgres_password | default('poc-db-password-change-me') }}@openclaw-postgres:5432/{{ postgres_db | default('openclaw_poc') }}"
      REDIS_URL: "redis://:{{ redis_password | default('changeme-redis-pw') }}@openclaw-redis:6379"
      LITELLM_BASE_URL: "{{ lookup('env', 'LITELLM_BASE_URL') | default('http://litellm-proxy:4000', true) }}"
      LITELLM_MASTER_KEY: "{{ lookup('env', 'LITELLM_MASTER_KEY') }}"
      LITELLM_CONFIG_PATH: "{{ lookup('env', 'LITELLM_CONFIG_PATH') | default('../../infra/litellm/config.yaml', true) }}"
      LLM_KEY_ENCRYPTION_KEY: "{{ lookup('env', 'LLM_KEY_ENCRYPTION_KEY') }}"
      SERVICE_SECRET: "{{ lookup('env', 'SERVICE_SECRET') | default(lookup('env', 'SERVICE_KEY'), true) }}"
      JWT_SECRET: "{{ lookup('env', 'JWT_SECRET') }}"
      DEFAULT_MODEL: "{{ lookup('env', 'DEFAULT_MODEL') | default('deepseek-chat', true) }}"
      CORS_ORIGINS: "{{ base_url }}"
      APP_BASE_URL: "{{ base_url }}"
      ADMIN_CONSOLE_URL: "{{ base_url }}"
      FLEET_PUBLIC_URL: "{{ base_url }}"
      OPENWEBUI_SERVICE_KEY: "{{ lookup('env', 'OPENWEBUI_SERVICE_KEY') | default(lookup('env', 'SERVICE_KEY'), true) }}"
      RAG_SERVICE_URL: "http://openclaw-rag-service:8000"
      RAG_INTERNAL_TOKEN: "{{ lookup('env', 'RAG_INTERNAL_TOKEN') }}"
      KNOWLEDGE_DIR: /app/data/uploads
      MINIO_ENDPOINT: "{{ minio_internal_endpoint | default('openclaw-minio') }}"
      MINIO_PORT: "{{ minio_internal_port | default('9000') | string }}"
      MINIO_ACCESS_KEY: "{{ lookup('env', 'MINIO_ACCESS_KEY') }}"
      MINIO_SECRET_KEY: "{{ lookup('env', 'MINIO_SECRET_KEY') }}"
      MINIO_BUCKET: "{{ minio_bucket | default('files') }}"
      MINIO_USE_SSL: "{{ minio_use_ssl | default('false') | string }}"
      HERMES_API_SERVER_KEY: "{{ lookup('env', 'HERMES_API_SERVER_KEY') }}"
      HERMES_RUNTIME_ENABLED: "true"
      HERMES_RUNTIME_IMAGE_VERSION: "{{ lookup('env', 'HERMES_RUNTIME_IMAGE_VERSION') | default(hermes_runtime_image_version | default('vecta-hermes-withopenclaw:v0.18.0-nospan-rc1'), true) }}"
      CONTAINER_DATA_DIR: /app/data/instances
      PORT_RANGE_MIN: "18800"
      PORT_RANGE_MAX: "18900"
      FLEET_PORT: "3000"
    volumes:
      - "{{ remote_dir }}/deploy:/app/data/instances"
      - "{{ remote_dir }}/data/fleet-gateway/uploads:/app/data/uploads"
    networks:
      - name: "{{ docker_network }}"
    memory: "2g"
