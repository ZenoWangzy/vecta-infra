- name: Deploy admin-console
  community.docker.docker_container:
    name: openclaw-admin-console
    image: "{{ admin_console_image }}"
    state: started
    restart_policy: unless-stopped
    pull: true
    image_name_mismatch: recreate
    env:
      DATABASE_URL: "postgresql://{{ postgres_user | default('openclaw_poc') }}:{{ postgres_password | default('poc-db-password-change-me') }}@openclaw-postgres:5432/{{ postgres_db | default('openclaw_poc') }}"
      TZ: Asia/Shanghai
    networks:
      - name: "{{ docker_network }}"
    memory: "256m"
    cpus: "0.25"
