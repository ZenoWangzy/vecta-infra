- name: Start Artifactory OSS container
  community.docker.docker_container:
    name: openclaw-artifactory
    image: "{{ jfrog_image }}"
    state: started
    restart_policy: unless-stopped
    ports:
      - "127.0.0.1:8082:8082"
    volumes:
      - "{{ jfrog_data_dir }}:/var/opt/jfrog/artifactory"
    networks:
      - name: openclaw-net

- name: Wait for Artifactory to be ready
  uri:
    url: "{{ jfrog_base_url }}/api/system/ping"
    method: GET
    status_code: 200
    timeout: 10
  register: jfrog_ping
  retries: 24
  delay: 5
  until: jfrog_ping.status == 200

- name: Check if Artifactory admin is already configured
  uri:
    url: "{{ jfrog_base_url }}/api/security/users/admin"
    method: GET
    user: admin
    password: "{{ lookup('env', 'NEXUS_ADMIN_PASSWORD') }}"
    force_basic_auth: true
    status_code: [200, 401, 404]
  register: jfrog_admin_check
  no_log: true

- name: Initialize Artifactory admin password
  uri:
    url: "{{ jfrog_base_url }}/api/security/users/admin"
    method: PUT
    body_format: json
    body:
      name: admin
      password: "{{ lookup('env', 'NEXUS_ADMIN_PASSWORD') }}"
      admin: true
      email: "admin@localhost"
    status_code: [200, 201]
  when: jfrog_admin_check.status == 401 or jfrog_admin_check.status == 404
  no_log: true

- name: Provision Artifactory repositories
  uri:
    url: "{{ jfrog_base_url }}/api/repositories/{{ item.key }}"
    method: PUT
    user: admin
    password: "{{ lookup('env', 'NEXUS_ADMIN_PASSWORD') }}"
    force_basic_auth: true
    body_format: json
    body: "{{ item.value }}"
    status_code: [200, 400]
  loop:
    - key: vecta-docker-remote
      value:
        rclass: remote
        packageType: docker
        url: "https://swr.cn-north-4.myhuaweicloud.com"
        repoLayoutRef: simple-default
    - key: vecta-docker-local
      value:
        rclass: local
        packageType: docker
        repoLayoutRef: simple-default
    - key: vecta-docker-virtual
      value:
        rclass: virtual
        packageType: docker
        repositories: [vecta-docker-remote, vecta-docker-local]
        defaultDeploymentRepo: vecta-docker-local
    - key: vecta-npm-remote
      value:
        rclass: remote
        packageType: npm
        url: "https://mirrors.tencent.com/npm/"
        repoLayoutRef: npm-default
    - key: vecta-npm-virtual
      value:
        rclass: virtual
        packageType: npm
        repositories: [vecta-npm-remote]
        defaultDeploymentRepo: vecta-npm-remote
  no_log: true

- name: Write .npmrc pointing to Artifactory npm virtual repo
  copy:
    content: |
      registry=http://{{ jfrog_host }}:{{ jfrog_port }}/artifactory/api/npm/vecta-npm-virtual/
      //{{ jfrog_host }}:{{ jfrog_port }}/artifactory/api/npm/vecta-npm-virtual/:_auth={{ ('admin:' + lookup('env', 'NEXUS_ADMIN_PASSWORD')) | b64encode }}
      always-auth=true
    dest: "{{ remote_dir }}/.npmrc"
    mode: "0600"
  no_log: true

- name: Configure Docker daemon registry mirror
  copy:
    content: |
      {
        "registry-mirrors": ["http://{{ jfrog_host }}:{{ jfrog_port }}/artifactory/api/docker/vecta-docker-virtual"]
      }
    dest: /etc/docker/daemon.json
    mode: "0644"
  notify: Reload Docker daemon

- name: Flush handlers
  meta: flush_handlers
