nexus_base_url: "http://127.0.0.1:8081"
nexus_blob_store: default

nexus_npm_proxy_repo: vecta-npm-proxy
nexus_npm_remote_url: "https://registry.npmjs.org"

nexus_pypi_proxy_repo: vecta-pypi-proxy
nexus_pypi_remote_url: "https://pypi.org"

nexus_alpine_proxy_repo: vecta-alpine-proxy
nexus_alpine_remote_url: "https://dl-cdn.alpinelinux.org/alpine"

nexus_debian_proxy_repo: vecta-debian-proxy
nexus_debian_remote_url: "http://deb.debian.org/debian"

nexus_debian_security_proxy_repo: vecta-debian-security-proxy
nexus_debian_security_remote_url: "http://deb.debian.org/debian-security"

# Docker registry — Nexus Docker-hosted connector on a dedicated port.
nexus_docker_connector_port: 8082
nexus_docker_hosted_repo: vecta-docker-local
nexus_docker_proxy_repo: vecta-docker-remote
nexus_docker_group_repo: vecta-docker-virtual
nexus_docker_remote_url: "https://swr.cn-north-4.myhuaweicloud.com"
nexus_docker_remote_index_url: "https://index.docker.io/"
