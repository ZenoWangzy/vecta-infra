- name: Inspect existing MinIO environment
  ansible.builtin.command:
    argv:
      - docker
      - inspect
      - --format
      - "{{ '{{' }}range .Config.Env{{ '}}' }}{{ '{{' }}println .{{ '}}' }}{{ '{{' }}end{{ '}}' }}"
      - openclaw-minio
  register: minio_existing_env
  changed_when: false
  failed_when: false
  check_mode: false
  no_log: true

- name: Resolve MinIO runtime contract
  set_fact:
    minio_existing_root_user: >-
      {{ (minio_existing_env.stdout_lines | default([]) | select('match', '^MINIO_ROOT_USER=') | map('regex_replace', '^MINIO_ROOT_USER=', '') | list | first | default('', true)) }}
    minio_existing_root_password: >-
      {{ (minio_existing_env.stdout_lines | default([]) | select('match', '^MINIO_ROOT_PASSWORD=') | map('regex_replace', '^MINIO_ROOT_PASSWORD=', '') | list | first | default('', true)) }}
    minio_existing_webhook_enabled: >-
      {{ (minio_existing_env.stdout_lines | default([]) | select('match', '^MINIO_NOTIFY_WEBHOOK_ENABLE_FLEET=') | map('regex_replace', '^MINIO_NOTIFY_WEBHOOK_ENABLE_FLEET=', '') | list | first | default('', true)) }}
    minio_existing_webhook_endpoint: >-
      {{ (minio_existing_env.stdout_lines | default([]) | select('match', '^MINIO_NOTIFY_WEBHOOK_ENDPOINT_FLEET=') | map('regex_replace', '^MINIO_NOTIFY_WEBHOOK_ENDPOINT_FLEET=', '') | list | first | default('', true)) }}
    minio_existing_webhook_auth_token: >-
      {{ (minio_existing_env.stdout_lines | default([]) | select('match', '^MINIO_NOTIFY_WEBHOOK_AUTH_TOKEN_FLEET=') | map('regex_replace', '^MINIO_NOTIFY_WEBHOOK_AUTH_TOKEN_FLEET=', '') | list | first | default('', true)) }}
  changed_when: false
  no_log: true

- name: Resolve MinIO effective settings
  set_fact:
    minio_root_user_effective: "{{ minio_root_user | default(minio_existing_root_user | default(lookup('env', 'MINIO_ACCESS_KEY') | default('openclaw', true), true), true) }}"
    minio_root_password_effective: "{{ minio_root_password | default(minio_existing_root_password | default(lookup('env', 'MINIO_SECRET_KEY') | default('openclaw-minio-password', true), true), true) }}"
    minio_webhook_enabled_effective: "{{ minio_webhook_enabled | default(minio_existing_webhook_enabled | default('off', true), true) }}"
    minio_webhook_endpoint_effective: "{{ minio_webhook_endpoint | default(minio_existing_webhook_endpoint | default('', true), true) }}"
    minio_webhook_auth_token_effective: "{{ minio_webhook_auth_token | default(minio_existing_webhook_auth_token | default(lookup('env', 'MINIO_WEBHOOK_SECRET') | default('', true), true), true) }}"
  changed_when: false
  no_log: true

- name: Start MinIO
  community.docker.docker_container:
    name: openclaw-minio
    image: "{{ minio_image }}"
    state: started
    pull: true
    image_name_mismatch: recreate
    restart_policy: "{{ minio_restart_policy | default('unless-stopped') }}"
    command: "server /data --console-address ':{{ minio_console_port | default('9001') }}'"
    ports: "{{ minio_published_ports | default([]) }}"
    volumes:
      - "{{ minio_data_volume | default(remote_dir + '/data/minio') }}:/data"
    env:
      MINIO_ROOT_USER: "{{ minio_root_user_effective }}"
      MINIO_ROOT_PASSWORD: "{{ minio_root_password_effective }}"
      MINIO_NOTIFY_WEBHOOK_ENABLE_FLEET: "{{ minio_webhook_enabled_effective }}"
      MINIO_NOTIFY_WEBHOOK_ENDPOINT_FLEET: "{{ minio_webhook_endpoint_effective }}"
      MINIO_NOTIFY_WEBHOOK_AUTH_TOKEN_FLEET: "{{ minio_webhook_auth_token_effective }}"
    networks:
      - name: "{{ docker_network }}"
        aliases: "{{ minio_network_aliases | default(['openclaw-minio']) }}"
    healthcheck: "{{ minio_healthcheck | default(omit) }}"
    memory: "{{ minio_memory | default(omit) }}"
    cpus: "{{ minio_cpus | default(omit) }}"

- name: Check minio-init marker
  stat:
    path: "{{ remote_dir }}/.minio-initialized"
  register: minio_init_marker

- name: Detect existing mypc MinIO storage
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - openclaw-minio
      - sh
      - -lc
      - "test -d /data/.minio.sys && test -n \"$(ls -A /data)\""
  register: minio_existing_storage
  changed_when: false
  failed_when: false
  check_mode: false
  when: "'mypc' in group_names"

- name: Run minio-init to create buckets
  community.docker.docker_container:
    name: openclaw-minio-init
    image: "{{ minio_mc_image }}"
    state: started
    pull: true
    image_name_mismatch: recreate
    restart_policy: "no"
    command: >
      /bin/sh -c "
      mc alias set local http://openclaw-minio:9000 {{ minio_root_user_effective | quote }} {{ minio_root_password_effective | quote }} &&
      mc mb --ignore-existing local/openclaw-files &&
      mc mb --ignore-existing local/openclaw-artifacts &&
      echo done"
    networks:
      - name: "{{ docker_network }}"
  when:
    - not minio_init_marker.stat.exists
    - "'mypc' not in group_names or minio_existing_storage.rc != 0"

- name: Write minio-init marker file
  copy:
    content: "{{ ansible_date_time.iso8601 }}\n"
    dest: "{{ remote_dir }}/.minio-initialized"
  when:
    - not minio_init_marker.stat.exists
    - "'mypc' not in group_names or minio_existing_storage.rc != 0"
