- name: Resolve MinIO root credentials
  set_fact:
    minio_root_user_effective: "{{ minio_root_user | default(lookup('env', 'MINIO_ACCESS_KEY') | default('openclaw', true), true) }}"
    minio_root_password_effective: "{{ minio_root_password | default(lookup('env', 'MINIO_SECRET_KEY') | default('openclaw-minio-password', true), true) }}"
  changed_when: false
  no_log: true

- name: Start MinIO
  community.docker.docker_container:
    name: openclaw-minio
    image: "{{ minio_image }}"
    state: started
    pull: true
    image_name_mismatch: recreate
    restart_policy: unless-stopped
    command: server /data --console-address ':9001'
    ports: "{{ minio_published_ports | default([]) }}"
    volumes:
      - "{{ remote_dir }}/data/minio:/data"
    env:
      MINIO_ROOT_USER: "{{ minio_root_user_effective }}"
      MINIO_ROOT_PASSWORD: "{{ minio_root_password_effective }}"
    networks:
      - name: "{{ docker_network }}"

- name: Check minio-init marker
  stat:
    path: "{{ remote_dir }}/.minio-initialized"
  register: minio_init_marker

- name: Run minio-init to create buckets
  community.docker.docker_container:
    name: openclaw-minio-init
    image: "{{ minio_mc_image }}"
    state: started
    pull: true
    image_name_mismatch: recreate
    restart_policy: "no"
    command: >
      /bin/sh -c "
      mc alias set local http://openclaw-minio:9000 {{ minio_root_user_effective | quote }} {{ minio_root_password_effective | quote }} &&
      mc mb --ignore-existing local/openclaw-files &&
      mc mb --ignore-existing local/openclaw-artifacts &&
      echo done"
    networks:
      - name: "{{ docker_network }}"
  when: not minio_init_marker.stat.exists

- name: Write minio-init marker file
  copy:
    content: "{{ ansible_date_time.iso8601 }}\n"
    dest: "{{ remote_dir }}/.minio-initialized"
  when: not minio_init_marker.stat.exists
