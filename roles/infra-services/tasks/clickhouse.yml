- name: Start ClickHouse
  community.docker.docker_container:
    name: openclaw-clickhouse
    image: "{{ clickhouse_image }}"
    state: started
    pull: true
    image_name_mismatch: recreate
    restart_policy: unless-stopped
    ports:
      - "{{ clickhouse_http_port | default('8123') }}:8123"
      - "{{ clickhouse_native_port | default('9100') }}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - "{{ remote_dir }}/infra/clickhouse/schema.sql:/docker-entrypoint-initdb.d/schema.sql"
    env:
      CLICKHOUSE_DB: "{{ clickhouse_db | default('openclaw_audit') }}"
      CLICKHOUSE_USER: "{{ clickhouse_user | default('openclaw') }}"
      CLICKHOUSE_PASSWORD: "{{ clickhouse_password | default('changeme-clickhouse-pw') }}"
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "0"
    networks:
      - name: "{{ docker_network }}"
    memory: "512m"
    cpus: "0.5"

- name: Wait for ClickHouse client readiness
  community.docker.docker_container_exec:
    container: openclaw-clickhouse
    argv:
      - clickhouse-client
      - --query
      - SELECT 1
  register: clickhouse_ready
  changed_when: false
  retries: 30
  delay: 2
  until: clickhouse_ready.rc == 0

- name: Apply ClickHouse schema idempotently
  community.docker.docker_container_exec:
    container: openclaw-clickhouse
    argv:
      - /bin/sh
      - -c
      - clickhouse-client --multiquery < /docker-entrypoint-initdb.d/schema.sql
  register: ch_schema
  changed_when: false
  failed_when: ch_schema.rc != 0
