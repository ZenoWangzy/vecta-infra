- name: Start Redis
  community.docker.docker_container:
    name: openclaw-redis
    image: "{{ redis_image }}"
    state: started
    pull: true
    image_name_mismatch: recreate
    restart_policy: "{{ redis_restart_policy | default('unless-stopped') }}"
    ports:
      - "{{ redis_port | default('6379') }}:6379"
    volumes:
      - "{{ redis_data_volume | default('redis_data') }}:/data"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: "10s"
      timeout: "3s"
      retries: 5
    networks:
      - name: "{{ docker_network }}"
        aliases: "{{ redis_network_aliases | default(['openclaw-redis']) }}"
    memory: "128m"
    cpus: "0.25"
