- name: Inspect existing LiteLLM environment
  ansible.builtin.command:
    argv:
      - docker
      - inspect
      - --format
      - "{{ '{{' }}range .Config.Env{{ '}}' }}{{ '{{' }}println .{{ '}}' }}{{ '{{' }}end{{ '}}' }}"
      - openclaw-litellm
  register: litellm_existing_env
  changed_when: false
  failed_when: false
  check_mode: false
  no_log: true

- name: Resolve LiteLLM effective provider environment
  ansible.builtin.set_fact:
    litellm_master_key_effective: >-
      {{ litellm_master_key | default((litellm_existing_env.stdout_lines | default([]) | select('match', '^LITELLM_MASTER_KEY=') | map('regex_replace', '^LITELLM_MASTER_KEY=', '') | list | first | default(lookup('env', 'LITELLM_MASTER_KEY'), true)), true) }}
    litellm_zai_api_base_effective: >-
      {{ litellm_zai_api_base | default((litellm_existing_env.stdout_lines | default([]) | select('match', '^ZAI_API_BASE=') | map('regex_replace', '^ZAI_API_BASE=', '') | list | first | default(lookup('env', 'ZAI_API_BASE'), true)), true) }}
    litellm_zai_api_key_effective: >-
      {{ litellm_zai_api_key | default((litellm_existing_env.stdout_lines | default([]) | select('match', '^ZAI_API_KEY=') | map('regex_replace', '^ZAI_API_KEY=', '') | list | first | default(lookup('env', 'ZAI_API_KEY'), true)), true) }}
    litellm_deepseek_api_key_effective: >-
      {{ litellm_deepseek_api_key | default((litellm_existing_env.stdout_lines | default([]) | select('match', '^DEEPSEEK_API_KEY=') | map('regex_replace', '^DEEPSEEK_API_KEY=', '') | list | first | default(lookup('env', 'DEEPSEEK_API_KEY'), true)), true) }}
    litellm_moonshot_api_base_effective: >-
      {{ litellm_moonshot_api_base | default((litellm_existing_env.stdout_lines | default([]) | select('match', '^MOONSHOT_API_BASE=') | map('regex_replace', '^MOONSHOT_API_BASE=', '') | list | first | default(lookup('env', 'MOONSHOT_API_BASE'), true)), true) }}
    litellm_moonshot_api_key_effective: >-
      {{ litellm_moonshot_api_key | default((litellm_existing_env.stdout_lines | default([]) | select('match', '^MOONSHOT_API_KEY=') | map('regex_replace', '^MOONSHOT_API_KEY=', '') | list | first | default(lookup('env', 'MOONSHOT_API_KEY'), true)), true) }}
  changed_when: false
  no_log: true

- name: Start LiteLLM proxy
  community.docker.docker_container:
    name: openclaw-litellm
    image: "{{ litellm_image }}"
    state: started
    pull: true
    image_name_mismatch: recreate
    restart_policy: "{{ litellm_restart_policy | default('always') }}"
    ports: "{{ litellm_published_ports | default(['4000:4000']) }}"
    volumes:
      - "{{ litellm_config_host_path | default(remote_dir + '/infra/litellm/config.yaml') }}:/app/config.yaml"
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    env:
      LITELLM_MASTER_KEY: "{{ litellm_master_key_effective }}"
      TZ: Asia/Shanghai
      ZAI_API_KEY: "{{ litellm_zai_api_key_effective }}"
      ZAI_API_BASE: "{{ litellm_zai_api_base_effective }}"
      DEEPSEEK_API_KEY: "{{ litellm_deepseek_api_key_effective }}"
      MOONSHOT_API_BASE: "{{ litellm_moonshot_api_base_effective }}"
      MOONSHOT_API_KEY: "{{ litellm_moonshot_api_key_effective }}"
    healthcheck: >-
      {{ (litellm_healthcheck_enabled | default(true) | bool) | ternary(
        litellm_healthcheck | default({
          'test': ['CMD', 'python', '-c', "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/readiness', timeout=3).read()"],
          'interval': '10s',
          'timeout': '5s',
          'retries': 5,
          'start_period': '30s'
        }), omit) }}
    networks:
      - name: "{{ docker_network }}"
        aliases: "{{ litellm_network_aliases | default(['openclaw-litellm']) }}"
    memory: "{{ litellm_memory | default('2g') }}"
    cpus: "{{ litellm_cpus | default('2.0') }}"
