- name: Run vtest smoke test
  shell: scripts/vtest-smoke.sh
  args:
    chdir: "{{ playbook_dir }}/.."
    executable: /bin/bash
  environment:
    BASE: "{{ base_url }}"
    # Smoke runs on the vtest host runner. OpenWebUI is public under /chat/,
    # so its deploy health contract is the host-local proxy health endpoint.
    FLEET_BASE: "http://127.0.0.1:{{ fleet_port | default(3000) }}"
    RAG_BASE: "http://127.0.0.1:8000"
    OPENWEBUI_BASE: "http://127.0.0.1:3002"
    INTERNAL_BASE: "http://127.0.0.1"
    AUTH_EMAIL: "{{ openwebui_smoke_auth_email | default('IT001@openclaw.internal') }}"
    SERVICE_KEY: "{{ lookup('env', 'OPENWEBUI_SERVICE_KEY') | default(lookup('env', 'SERVICE_KEY'), true) }}"
    SMOKE_CHANNEL_REQUIRED: "{{ ((((lookup('env', 'WECOM_BOT_ID') | trim | length) > 0) and ((lookup('env', 'WECOM_BOT_SECRET') | trim | length) > 0)) | ternary('true', 'false')) }}"
  changed_when: false
