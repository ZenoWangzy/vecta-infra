- name: Run vecta migrator image
  community.docker.docker_container:
    name: openclaw-vecta-migrator
    image: "{{ vecta_migrator_image }}"
    state: started
    detach: false
    cleanup: true
    pull: always
    env:
      DATABASE_URL: "postgresql://{{ postgres_user | default('openclaw_poc') }}:{{ postgres_password | default('poc-db-password-change-me') }}@openclaw-postgres:5432/{{ postgres_db | default('openclaw_poc') }}"
      TZ: Asia/Shanghai
    networks:
      - name: "{{ docker_network }}"
  register: migrator_result
