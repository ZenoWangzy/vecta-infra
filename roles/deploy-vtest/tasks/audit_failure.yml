- name: Write deploy audit (failure)
  shell: scripts/write-deploy-audit.sh failure "{{ deploy_sha }}" vtest
  args:
    chdir: "{{ playbook_dir }}/.."
    executable: /bin/bash
  environment:
    DATABASE_URL: "postgresql://{{ postgres_user | default('openclaw_poc') }}:{{ postgres_password | default('poc-db-password-change-me') }}@127.0.0.1:5432/{{ postgres_db | default('openclaw_poc') }}"
  changed_when: true
  ignore_errors: true
