# Reusable workflow called by vecta app repo stub and by manual dispatch.
# Runs on the vtest self-hosted runner (co-located with the vtest host).
on:
  workflow_call:
    inputs:
      image_tag:
        type: string
        required: true
        description: "Docker image tag (commit SHA) to deploy"
      run_migrations:
        type: boolean
        default: false
        description: "Whether to run DB migrations before deploy"
      tags:
        type: string
        default: vecta-app
        description: "Ansible tags to run (vecta-app, infra, search, open-webui, openclaw, nexus, jfrog, all)"
      migration_artifact_run_id:
        type: string
        default: ''
        description: "GitHub run ID containing the migration-sqls artifact"
      docker_cache_prune_until:
        type: string
        default: 48h
        description: "Docker cache retention on the vtest runner after deploy; set to 'never' to skip"
    secrets:
      VTEST_DATABASE_URL:
        required: true
      SERVICE_KEY:
        required: true
      NEXUS_ADMIN_PASSWORD:
        required: true
      WECOM_CORP_ID:
        required: false
      WECOM_CONTACTS_SECRET:
        required: false
      PROXY_USERNAME:
        required: false
      PROXY_PASSWORD:
        required: false

jobs:
  deploy:
    runs-on: [self-hosted, vtest]
    concurrency:
      group: vtest-deploy
      cancel-in-progress: false
    env:
      DATABASE_URL: ${{ secrets.VTEST_DATABASE_URL }}
      SERVICE_KEY: ${{ secrets.SERVICE_KEY }}
      NEXUS_ADMIN_PASSWORD: ${{ secrets.NEXUS_ADMIN_PASSWORD }}
      WECOM_CORP_ID: ${{ secrets.WECOM_CORP_ID }}
      WECOM_CONTACTS_SECRET: ${{ secrets.WECOM_CONTACTS_SECRET }}
      DEPLOY_SHA: ${{ inputs.image_tag }}
      VTEST_ALLOW_MIGRATE: ${{ inputs.run_migrations && '1' || '0' }}
      DEPLOY_TAGS: ${{ inputs.tags || 'vecta-app' }}
    steps:
      - name: Configure git proxy
        run: |
          if [ -z "${PROXY_USERNAME:-}" ] || [ -z "${PROXY_PASSWORD:-}" ]; then
            echo "Proxy secrets not set; using default git network path"
            exit 0
          fi
          PU="$(printf '%s' "${PROXY_USERNAME}" | od -An -tx1 | tr -d ' \n' | sed 's/../%&/g')"
          PP="$(printf '%s' "${PROXY_PASSWORD}" | od -An -tx1 | tr -d ' \n' | sed 's/../%&/g')"
          PROXY="http://${PU}:${PP}@geraldsynnas.ddns.net:8888"
          git config --global http.proxy "$PROXY"
          git config --global https.proxy "$PROXY"
        env:
          PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
          PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}

      - uses: actions/checkout@v4
        with:
          repository: ZenoWangzy/vecta-infra
          ref: main

      - name: Download migration SQL files
        if: inputs.migration_artifact_run_id != ''
        uses: actions/download-artifact@v4
        with:
          name: migration-sqls
          run-id: ${{ inputs.migration_artifact_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: /tmp/migration-sqls

      - name: Fail closed if secrets missing
        run: |
          for v in DATABASE_URL SERVICE_KEY NEXUS_ADMIN_PASSWORD; do
            [ -n "${!v:-}" ] || { echo "secret $v missing — refusing to deploy"; exit 1; }
          done

      - name: Validate image tag is immutable full SHA
        run: |
          case "$DEPLOY_SHA" in
            [0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f]) ;;
            *) echo "image_tag must be a full 40-character lowercase Git SHA" >&2; exit 1 ;;
          esac

      - name: Deploy via Ansible
        run: |
          set -euo pipefail
          ci_wecom_corp_id="${WECOM_CORP_ID:-}"
          ci_wecom_contacts_secret="${WECOM_CONTACTS_SECRET:-}"
          if [ -f /data/ocee/.env ]; then
            set -a
            . /data/ocee/.env
            set +a
          fi
          export SERVICE_KEY="${OPENWEBUI_SERVICE_KEY:-${SERVICE_KEY:-}}"
          [ -n "$ci_wecom_corp_id" ] && export WECOM_CORP_ID="$ci_wecom_corp_id"
          [ -n "$ci_wecom_contacts_secret" ] && export WECOM_CONTACTS_SECRET="$ci_wecom_contacts_secret"
          ansible-playbook playbooks/deploy.yml \
            -i inventories/vtest/hosts.ini \
            -e "deploy_sha=$DEPLOY_SHA" \
            -e "vtest_allow_migrate=$VTEST_ALLOW_MIGRATE" \
            -e "vtest_migration_files=$(ls /tmp/migration-sqls/*.sql 2>/dev/null | tr '\n' ',' | sed 's/,$//' || echo '')" \
            --tags "${DEPLOY_TAGS:-vecta-app}"

      - name: Prune vtest Docker build state
        if: always()
        run: bash scripts/prune-vtest-docker-build-state.sh
        env:
          VTEST_DOCKER_CACHE_PRUNE_UNTIL: ${{ inputs.docker_cache_prune_until }}
