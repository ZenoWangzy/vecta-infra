---
# Manual production build entry point. It builds an explicitly selected VectA
# SHA into the production-local Nexus on the mypc runner only.
name: Build mypc production images

"on":
  workflow_dispatch:
    inputs:
      source_sha:
        type: string
        required: true
        description: >-
          Full 40-character VectA SHA to build into mypc Nexus
      source_branch:
        type: choice
        required: true
        default: develop
        description: >-
          Branch that must contain source_sha. develop is temporary for the
          incremental production build lane.
        options:
          - develop
          - main
      docker_cache_prune_until:
        type: string
        default: 48h
        description: >-
          Docker build-cache retention on the mypc runner; set to 'never'
          to skip

permissions:
  contents: read

concurrency:
  group: mypc-production-build-v2
  cancel-in-progress: false

jobs:
  build:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.repository == 'ZenoWangzy/vecta-infra'
    runs-on: [self-hosted, mypc, prod-build]
    environment: production
    timeout-minutes: 240
    env:
      SOURCE_SHA: ${{ inputs.source_sha }}
      SOURCE_BRANCH: ${{ inputs.source_branch }}
      NEXUS_DOCKER_REGISTRY: 127.0.0.1:8082
      DOCKER_BASE_IMAGE_REGISTRY: 127.0.0.1:8082
      DOCKER_BASE_IMAGE_SOURCE_REGISTRY: 127.0.0.1:8082
      NPM_REGISTRY: http://127.0.0.1:8081/repository/vecta-npm-proxy/
      NPM_CONFIG_REGISTRY: http://127.0.0.1:8081/repository/vecta-npm-proxy/
      PIP_INDEX_URL: >-
        http://127.0.0.1:8081/repository/vecta-pypi-proxy/simple/
      ALPINE_MIRROR: http://127.0.0.1:8081/repository/vecta-alpine-proxy
      DEBIAN_MIRROR: http://127.0.0.1:8081/repository/vecta-debian-proxy
      DEBIAN_SECURITY_MIRROR: >-
        http://127.0.0.1:8081/repository/vecta-debian-security-proxy
      DOCKER_BUILDKIT: "0"
    steps:
      - name: Configure git proxy
        run: |
          if [ -z "${PROXY_USERNAME:-}" ] || [ -z "${PROXY_PASSWORD:-}" ]; then
            echo "Proxy secrets not set; using default git network path"
            exit 0
          fi
          PU="$(printf '%s' "${PROXY_USERNAME}" \
            | od -An -tx1 | tr -d ' \n' | sed 's/../%&/g')"
          PP="$(printf '%s' "${PROXY_PASSWORD}" \
            | od -An -tx1 | tr -d ' \n' | sed 's/../%&/g')"
          PROXY="http://${PU}:${PP}@geraldsynnas.ddns.net:8888"
          git config --global http.proxy "$PROXY"
          git config --global https.proxy "$PROXY"
        env:
          PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
          PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}

      - name: Validate selected SHA
        run: |
          if ! printf '%s' "$SOURCE_SHA" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "source_sha must be a full 40-character lowercase Git SHA" >&2
            exit 1
          fi

      - name: Download selected VectA source
        run: |
          set -euo pipefail
          [ -n "${VECTA_READ_TOKEN:-}" ] || {
            echo "VECTA_READ_TOKEN secret is required" >&2
            exit 1
          }
          case "$SOURCE_BRANCH" in
            main|develop) ;;
            *) echo "unsupported source_branch: $SOURCE_BRANCH" >&2; exit 1 ;;
          esac
          curl_config="$(mktemp)"
          trap 'rm -f "$curl_config" /tmp/vecta-source.tar.gz' EXIT
          chmod 600 "$curl_config"
          {
            printf 'header = "Authorization: Bearer %s"\n' "$VECTA_READ_TOKEN"
            printf 'header = "Accept: application/vnd.github+json"\n'
            printf 'retry = 5\nretry-delay = 5\nconnect-timeout = 30\n'
          } > "$curl_config"
          branch_json="$(curl -fsSL --config "$curl_config" \
            "https://api.github.com/repos/ZenoWangzy/vecta/git/ref/heads/${SOURCE_BRANCH}")"
          branch_sha="$(printf '%s' "$branch_json" | node -e '
            let input = "";
            process.stdin.on("data", chunk => input += chunk);
            process.stdin.on("end", () => {
              const ref = JSON.parse(input);
              process.stdout.write(ref.object.sha);
            });
          ')"
          if [ "$branch_sha" != "$SOURCE_SHA" ]; then
            echo "source_sha must be the selected branch HEAD" >&2
            echo "expected=$SOURCE_SHA actual=$branch_sha" >&2
            exit 1
          fi
          mkdir -p vecta
          source_cache="/home/github-runner/source-cache/vecta-${SOURCE_SHA}.tar.gz"
          if [ -s "$source_cache" ]; then
            cp "$source_cache" /tmp/vecta-source.tar.gz
          else
            curl -fL \
              --config "$curl_config" \
              -o /tmp/vecta-source.tar.gz \
              "https://api.github.com/repos/ZenoWangzy/vecta/tarball/${SOURCE_SHA}"
          fi
          tar -xzf /tmp/vecta-source.tar.gz --strip-components=1 -C vecta
        env:
          VECTA_READ_TOKEN: ${{ secrets.VECTA_READ_TOKEN }}

      - name: Preflight production build runner
        run: |
          set -euo pipefail
          command -v docker >/dev/null || {
            echo "docker is required" >&2; exit 1;
          }
          command -v node >/dev/null || {
            echo "node is required" >&2; exit 1;
          }
          command -v pnpm >/dev/null || {
            echo "pnpm is required" >&2; exit 1;
          }
          available_kb="$(df -Pk . | awk 'NR==2 {print $4}')"
          if [ "$available_kb" -lt 62914560 ]; then
            echo "at least 60GiB free disk is required" >&2
            exit 1
          fi

      - name: Ensure production Nexus is running
        run: |
          set -euo pipefail
          [ -n "${NEXUS_ADMIN_PASSWORD:-}" ] || {
            echo "NEXUS_ADMIN_PASSWORD secret is required" >&2
            exit 1
          }
          if ! docker ps -a --format '{{.Names}}' | grep -qx vecta-nexus; then
            docker volume create vecta-nexus-data
            docker run -d \
              --name vecta-nexus \
              --restart unless-stopped \
              -p 127.0.0.1:8081:8081 \
              -p 127.0.0.1:8082:8082 \
              -p 127.0.0.1:8083:8083 \
              -v vecta-nexus-data:/nexus-data \
              sonatype/nexus3:3.79.1
          else
            docker start vecta-nexus >/dev/null
          fi
          for _ in $(seq 1 120); do
            if curl -fsS http://127.0.0.1:8081/service/rest/v1/status \
              >/dev/null; then
              break
            fi
            sleep 5
          done
          if ! curl -fsS http://127.0.0.1:8081/service/rest/v1/status \
            >/dev/null; then
            echo "Nexus did not become ready" >&2
            docker logs --tail 100 vecta-nexus >&2 || true
            exit 1
          fi
          if docker exec vecta-nexus test -s /nexus-data/admin.password; then
            initial_password="$(docker exec vecta-nexus \
              cat /nexus-data/admin.password | tr -d '\r\n')"
            curl -fsS \
              -u "admin:${initial_password}" \
              -X PUT \
              -H 'Content-Type: text/plain' \
              --data-binary "$NEXUS_ADMIN_PASSWORD" \
              http://127.0.0.1:8081/service/rest/v1/security/users/admin/change-password
            docker exec vecta-nexus rm -f /nexus-data/admin.password || true
          fi
          curl -fsS \
            -u "admin:${NEXUS_ADMIN_PASSWORD}" \
            http://127.0.0.1:8081/service/rest/v1/status >/dev/null
          curl -fsS \
            -u "admin:${NEXUS_ADMIN_PASSWORD}" \
            -X POST \
            -H 'Content-Type: application/json' \
            --data-binary '{"accepted":true}' \
            http://127.0.0.1:8081/service/rest/v1/system/eula >/dev/null
        env:
          NEXUS_ADMIN_PASSWORD: ${{ secrets.NEXUS_ADMIN_PASSWORD }}

      - name: Provision production Nexus repositories
        run: |
          set -euo pipefail
          node <<'NODE'
          const base = 'http://127.0.0.1:8081/service/rest/v1';
          const password = process.env.NEXUS_ADMIN_PASSWORD;
          if (!password) throw new Error('NEXUS_ADMIN_PASSWORD is required');
          const auth = 'Basic ' + Buffer
            .from(`admin:${password}`)
            .toString('base64');

          async function request(method, path, body, ok = [200, 201, 204]) {
            const res = await fetch(`${base}${path}`, {
              method,
              headers: {
                Authorization: auth,
                Accept: 'application/json',
                ...(body ? { 'Content-Type': 'application/json' } : {}),
              },
              body: body ? JSON.stringify(body) : undefined,
            });
            if (!ok.includes(res.status)) {
              const text = await res.text();
              throw new Error(`${method} ${path} -> ${res.status}: ${text}`);
            }
            return res;
          }

          async function exists(name) {
            const res = await request(
              'GET',
              `/repositories/${name}`,
              null,
              [200, 404],
            );
            return res.status === 200;
          }

          async function upsert(format, type, name, body) {
            const present = await exists(name);
            const suffix = present ? `/${name}` : '';
            await request(
              present ? 'PUT' : 'POST',
              `/repositories/${format}/${type}${suffix}`,
              body,
            );
          }

          const storage = {
            blobStoreName: 'default',
            strictContentTypeValidation: true,
          };
          const proxyDefaults = remoteUrl => ({
            online: true,
            storage,
            proxy: { remoteUrl, contentMaxAge: 1440, metadataMaxAge: 1440 },
            negativeCache: { enabled: true, timeToLive: 1440 },
            httpClient: {
              blocked: false,
              autoBlock: true,
              connection: { retries: 2, timeout: 300 },
            },
          });

          await upsert('npm', 'proxy', 'vecta-npm-proxy', {
            name: 'vecta-npm-proxy',
            ...proxyDefaults('https://registry.npmjs.org'),
          });
          await upsert('pypi', 'proxy', 'vecta-pypi-proxy', {
            name: 'vecta-pypi-proxy',
            ...proxyDefaults('https://pypi.org'),
            pypi: { indexPath: '/simple' },
          });
          for (const repo of [
            ['vecta-alpine-proxy', 'https://dl-cdn.alpinelinux.org/alpine'],
            ['vecta-debian-proxy', 'http://deb.debian.org/debian'],
            [
              'vecta-debian-security-proxy',
              'http://deb.debian.org/debian-security',
            ],
          ]) {
            await upsert('raw', 'proxy', repo[0], {
              name: repo[0],
              ...proxyDefaults(repo[1]),
              storage: {
                blobStoreName: 'default',
                strictContentTypeValidation: false,
              },
              raw: {
                contentDisposition: 'ATTACHMENT',
                forwardQueryParameters: true,
              },
            });
          }
          await upsert('docker', 'hosted', 'vecta-docker-local', {
            name: 'vecta-docker-local',
            online: true,
            storage: { ...storage, writePolicy: 'ALLOW' },
            docker: { v1Enabled: false, forceBasicAuth: true, httpPort: 8082 },
          });
          await upsert('docker', 'proxy', 'vecta-docker-remote', {
            name: 'vecta-docker-remote',
            ...proxyDefaults('https://registry-1.docker.io'),
            docker: { v1Enabled: false, forceBasicAuth: true },
            dockerProxy: {
              indexType: 'REGISTRY',
              indexUrl: 'https://index.docker.io/',
            },
          });
          await upsert('docker', 'group', 'vecta-docker-virtual', {
            name: 'vecta-docker-virtual',
            online: true,
            storage,
            group: {
              memberNames: ['vecta-docker-remote', 'vecta-docker-local'],
            },
            docker: { v1Enabled: false, forceBasicAuth: true, httpPort: 8083 },
          });
          NODE
          for port in 8082 8083; do
            for _ in $(seq 1 30); do
              if curl -fsS -o /dev/null -w '%{http_code}' \
                "http://127.0.0.1:${port}/v2/" | grep -Eq '^(200|401)$'; then
                break
              fi
              sleep 2
            done
          done
        env:
          NEXUS_ADMIN_PASSWORD: ${{ secrets.NEXUS_ADMIN_PASSWORD }}

      - name: Login to production Nexus Docker registry
        run: >-
          echo "$NEXUS_ADMIN_PASSWORD" |
          docker login "$NEXUS_DOCKER_REGISTRY" -u admin --password-stdin
        env:
          NEXUS_ADMIN_PASSWORD: ${{ secrets.NEXUS_ADMIN_PASSWORD }}

      - name: Validate image contract
        working-directory: vecta
        run: pnpm check:vtest-images

      - name: Build and push production images
        working-directory: vecta
        run: >-
          nice -n 10 ionice -c2 -n7
          node scripts/build-push-vtest-images.mjs
        env:
          GITHUB_SHA: ${{ inputs.source_sha }}

      - name: Prune mypc Docker build cache
        if: always() && inputs.docker_cache_prune_until != 'never'
        run: |
          set -euo pipefail
          docker builder prune --force \
            --filter "until=${{ inputs.docker_cache_prune_until }}"
