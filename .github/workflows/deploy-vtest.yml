# Manual dispatch entry point for vecta-infra. Handles Nexus-backed full deploys
# and targeted role updates.
name: Deploy vtest

on:
  workflow_dispatch:
    inputs:
      image_tag:
        type: string
        required: true
        description: "Full 40-character Git SHA already present in vtest Nexus"
      run_migrations:
        type: boolean
        default: false
        description: "Run DB migrations before deploy"
      migration_files:
        type: string
        description: "Comma-separated SQL filenames from migrations/ dir (e.g. 0042_add_share_links.sql)"
        default: ''
      tags:
        type: string
        description: "Ansible tags: nexus / infra / search / open-webui / openclaw / vecta-app / fruit-vtest / all"
        default: open-webui,vecta-app,fruit-vtest
      fruit_bootstrap:
        type: boolean
        default: false
        description: "Explicitly run Fruit schema/runtime-role bootstrap before the service deploy"
      docker_cache_prune_until:
        type: string
        description: "Docker cache retention on the vtest runner after deploy; set to 'never' to skip"
        default: 48h

jobs:
  upload-migrations:
    if: inputs.run_migrations == true && inputs.migration_files != ''
    runs-on: [self-hosted, vtest]
    steps:
      - name: Configure git proxy
        run: |
          if [ -z "${PROXY_USERNAME:-}" ] || [ -z "${PROXY_PASSWORD:-}" ]; then
            echo "Proxy secrets not set; using default git network path"
            exit 0
          fi
          PU="$(printf '%s' "${PROXY_USERNAME}" | od -An -tx1 | tr -d ' \n' | sed 's/../%&/g')"
          PP="$(printf '%s' "${PROXY_PASSWORD}" | od -An -tx1 | tr -d ' \n' | sed 's/../%&/g')"
          PROXY="http://${PU}:${PP}@geraldsynnas.ddns.net:8888"
          git config --global http.proxy "$PROXY"
          git config --global https.proxy "$PROXY"
        env:
          PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
          PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}

      - uses: actions/checkout@v4
        with:
          repository: ZenoWangzy/vecta
          token: ${{ secrets.VECTA_READ_TOKEN || github.token }}

      - name: Stage migration SQL files
        shell: bash
        env:
          MIGRATION_FILES: ${{ inputs.migration_files }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/migration-sqls
          IFS=',' read -r -a files <<< "$MIGRATION_FILES"
          for file in "${files[@]}"; do
            file="${file#"${file%%[![:space:]]*}"}"
            file="${file%"${file##*[![:space:]]}"}"
            case "$file" in ''|*/*|*..*|.*) echo "invalid migration filename: $file" >&2; exit 1 ;; esac
            case "$file" in *.sql) ;; *) echo "migration file must be a .sql filename: $file" >&2; exit 1 ;; esac
            [ -f "migrations/$file" ] || { echo "migration file not found: migrations/$file" >&2; exit 1; }
            cp -- "migrations/$file" /tmp/migration-sqls/
          done

      - name: Upload migration SQL files as artifact
        uses: actions/upload-artifact@v4
        with:
          name: migration-sqls
          retention-days: 1
          path: /tmp/migration-sqls/*.sql

  deploy:
    needs: [upload-migrations]
    if: always() && (needs.upload-migrations.result == 'success' || needs.upload-migrations.result == 'skipped')
    uses: ./.github/workflows/_deploy-vtest-job.yml
    with:
      image_tag: ${{ inputs.image_tag }}
      run_migrations: ${{ inputs.run_migrations }}
      tags: ${{ inputs.tags }}
      migration_artifact_run_id: ${{ needs.upload-migrations.result == 'success' && github.run_id || '' }}
      docker_cache_prune_until: ${{ inputs.docker_cache_prune_until }}
      fruit_bootstrap: ${{ inputs.fruit_bootstrap }}
    secrets: inherit
